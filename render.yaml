services:
  - type: web
    name: metabase-poc
    runtime: static
    buildCommand: cd client && yarn install && yarn build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_AUTH_MODE
        value: jwt
      - key: VITE_METABASE_INSTANCE_URL
        sync: false
      - key: VITE_DASHBOARD_ID
        value: "1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
